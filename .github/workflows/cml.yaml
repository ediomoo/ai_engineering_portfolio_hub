name: Unified Model Training
on: [push]
jobs:
  train-and-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v3
      
      - uses: iterative/setup-cml@v1

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Train and Save
        env: 
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Run your training
          python -m src.loan.pipeline.train_pipeline > loan_output.txt
          python -m src.insurance.pipeline.train_pipeline > insurance_output.txt

          # 2. Create Unified CML Report
          echo "# 🚀 Portfolio Training Report" > report.md
          echo "## 💰 Loan Approval Model" >> report.md
          tail -n 5 loan_output.txt >> report.md
          echo "## 🏥 Medical Insurance Model" >> report.md
          tail -n 5 insurance_output.txt >> report.md
          
          # Post the comment
          cml comment create report.md

          # 3. Save the .pkl files to GitHub
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Force add the models
          git add -f artifacts/loan/*.pkl
          git add -f artifacts/insurance/*.pkl
          
          git commit -m "Automated model update [skip ci]" || echo "No changes to commit"
          git push
